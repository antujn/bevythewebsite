name: Lighthouse CI

# Runs Google Lighthouse against every PR + every push to main so
# Performance, Accessibility, Best Practices, SEO, and PWA scores
# are tracked over time and regressions get caught before merge.
#
# Results are uploaded to Lighthouse's public storage (no secrets
# required) and linked in the PR check output. If a score drops
# below the thresholds in `lighthouserc.json` the check fails and
# the PR is blocked.
#
# Local reproduction:
#   npm run build && npm run start &
#   npx lhci autorun

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Audit homepage + key SEO routes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Run Lighthouse CI
        # Lighthouse spins up `next start` itself per the config.
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          # Public, unauthenticated upload target. Lighthouse's public
          # storage is fine for marketing sites — no sensitive URLs
          # audited. Swap for a self-hosted LHCI server if that
          # changes.
          LHCI_UPLOAD_TARGET: temporary-public-storage
